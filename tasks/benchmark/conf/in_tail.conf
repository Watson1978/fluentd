<system>
  enable_jit true
</system>

<source>
  @type tail
  tag benchmark
  path "#{File.expand_path './tmp/benchmark/data.log'}"
  read_from_head true
  format tsv
  keys k1,k2,k3,k4,k5,k6,k7,k8,k9
  time_key k1
  time_format %d/%b/%Y:%H:%M:%S %z
  keep_time_key true
</source>

<match **>
  @type null
#  @type file
#  path "#{File.expand_path './tmp/benchmark/in_tail'}"
</match>
